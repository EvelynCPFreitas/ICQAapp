<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ICQA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090F15',
                        darkCard: '#444E54',
                        darkText: '#B3B7BA',
                        lightBg: '#D3D1CE',
                        lightCard: '#FFFFFF',
                        primaryBtn: '#002147',
                        borderGray: '#6C6D74'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-lightBg dark:bg-darkBg transition-colors duration-300">

    <header class="bg-lightBg dark:bg-darkBg border-b border-borderGray/30 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <h1 class="text-black dark:text-darkText font-bold text-xl">Portal ICQA</h1>
            
            <nav class="flex items-center space-x-4">
                <div class="flex space-x-1 bg-gray-300/50 dark:bg-black/20 p-1 rounded-lg" id="navbar">
                    <button data-tab="conferencia" class="nav-btn px-4 py-2 rounded-md text-sm font-bold bg-primaryBtn text-white shadow">Conferência</button>
                    <button data-tab="auditoria" class="nav-btn px-4 py-2 rounded-md text-sm font-bold text-black dark:text-darkText hover:bg-gray-400 dark:hover:bg-gray-700">Auditoria</button>
                    <button data-tab="dashboard" class="nav-btn px-4 py-2 rounded-md text-sm font-bold text-black dark:text-darkText hover:bg-gray-400 dark:hover:bg-gray-700">Dashboard</button>
                </div>
                <button id="theme-toggle" class="p-2 rounded-full bg-gray-300 dark:bg-darkCard text-black dark:text-white">
                    <i data-lucide="sun" class="dark:hidden w-5 h-5"></i>
                    <i data-lucide="moon" class="hidden dark:block w-5 h-5"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <section id="tab-conferencia" class="page-section">
            <div class="max-w-xl mx-auto bg-lightCard dark:bg-darkCard p-6 rounded-xl shadow-sm border border-borderGray/30">
                <h2 class="text-xl font-bold text-black dark:text-darkText mb-6">Nova Conferência ICQA</h2>
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm text-black dark:text-darkText mb-1">MZ</label>
                        <input type="text" placeholder="Ex: MZ-04" class="w-full p-2 bg-transparent border border-borderGray rounded text-black dark:text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-black dark:text-darkText mb-1">MELI</label>
                        <input type="text" placeholder="Ex: MELI-12345" class="w-full p-2 bg-transparent border border-borderGray rounded text-black dark:text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-black dark:text-darkText mb-1">QUANTIDADE</label>
                        <input type="number" placeholder="Ex: 15" class="w-full p-2 bg-transparent border border-borderGray rounded text-black dark:text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-black dark:text-darkText mb-2">Físico está de acordo com o sistêmico?</label>
                        <div class="flex space-x-4 text-black dark:text-darkText">
                            <label><input type="radio" name="acordo" checked> Sim</label>
                            <label><input type="radio" name="acordo"> Não</label>
                        </div>
                    </div>
                    <button type="button" class="w-full bg-primaryBtn text-white py-3 rounded-lg font-bold mt-4">Salvar e Enviar Task</button>
                </form>
            </div>
        </section>

        <section id="tab-auditoria" class="page-section hidden">
            <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl shadow-sm border border-borderGray/30 text-black dark:text-darkText">
                <h2 class="text-xl font-bold mb-4">Auditoria</h2>
                <p>Lista de casos para auditar...</p>
            </div>
        </section>

        <section id="tab-dashboard" class="page-section hidden">
            <div class="bg-lightCard dark:bg-darkCard p-6 rounded-xl shadow-sm border border-borderGray/30 text-black dark:text-darkText">
                <h2 class="text-xl font-bold mb-4">Dashboard</h2>
                <p>Monitoramento geral das tasks...</p>
            </div>
        </section>
    </main>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        document.querySelectorAll('.nav-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`tab-${button.getAttribute('data-tab')}`).classList.remove('hidden');
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-primaryBtn', 'text-white'));
                button.classList.add('bg-primaryBtn', 'text-white');
            });
        });
        lucide.createIcons();
    </script>
</body>
</html>
