<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ICQA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 
            darkBg: '#090F15', darkCard: '#444E54', darkText: '#B3B7BA', 
            lightBg: '#D3D1CE', lightCard: '#FFFFFF', primaryBtn: '#002147', borderGray: '#6C6D74' 
        }}}}
    </script>
</head>
<body class="bg-lightBg dark:bg-darkBg transition-colors duration-300">

    <header class="bg-lightBg dark:bg-darkBg border-b border-borderGray/30 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <h1 class="text-black dark:text-darkText font-bold text-xl">Portal ICQA</h1>
            <nav class="flex items-center space-x-4">
                <div class="flex space-x-1 bg-gray-300/50 dark:bg-black/20 p-1 rounded-lg" id="navbar">
                    <button data-tab="conferencia" class="nav-btn px-4 py-2 rounded-md text-sm font-bold bg-primaryBtn text-white shadow">Conferência</button>
                    <button data-tab="auditoria" class="nav-btn px-4 py-2 rounded-md text-sm font-bold text-black dark:text-darkText">Auditoria</button>
                    <button data-tab="dashboard" class="nav-btn px-4 py-2 rounded-md text-sm font-bold text-black dark:text-darkText">Dashboard</button>
                </div>
                <button id="theme-toggle" class="p-2 rounded-full bg-gray-300 dark:bg-darkCard text-black dark:text-white">
                    <i data-lucide="sun" class="dark:hidden w-5 h-5"></i>
                    <i data-lucide="moon" class="hidden dark:block w-5 h-5"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- ABA CONFERÊNCIA -->
        <section id="tab-conferencia" class="page-section">
            <div class="max-w-xl mx-auto bg-lightCard dark:bg-darkCard p-8 rounded-xl shadow-sm border border-borderGray/30">
                <h2 class="text-2xl font-bold text-black dark:text-darkText mb-6">Nova Conferência ICQA</h2>
                <form class="space-y-4">
                    <input type="text" id="mz" placeholder="MZ" class="w-full p-2 border rounded dark:bg-black/20 dark:text-white">
                    <input type="text" id="meli" placeholder="MELI" class="w-full p-2 border rounded dark:bg-black/20 dark:text-white">
                    <input type="number" id="qtd" placeholder="QUANTIDADE" class="w-full p-2 border rounded dark:bg-black/20 dark:text-white">
                    
                    <div class="bg-gray-100 dark:bg-black/20 p-3 rounded border">
                        <label class="block text-sm font-bold text-black dark:text-darkText mb-2">Físico está de acordo com o sistêmico?</label>
                        <div class="flex space-x-6 text-sm dark:text-darkText">
                            <label class="flex items-center space-x-2"><input type="radio" name="acordo" value="Sim" onclick="toggleFound(false)"> <span>Sim</span></label>
                            <label class="flex items-center space-x-2"><input type="radio" name="acordo" value="Não" onclick="toggleFound(true)"> <span>Não</span></label>
                        </div>
                    </div>

                    <div id="found-section" class="hidden p-3 border-l-4 border-red-500 bg-gray-100 dark:bg-black/20 rounded">
                        <label class="block text-sm font-bold text-black dark:text-darkText mb-2">Foi realizado Found?</label>
                        <div class="flex space-x-6 text-sm dark:text-darkText mb-4">
                            <label class="flex items-center space-x-2"><input type="radio" name="found" value="Sim" onclick="toggleDataFields(true)"> <span>Sim</span></label>
                            <label class="flex items-center space-x-2"><input type="radio" name="found" value="Não" onclick="toggleDataFields(false)"> <span>Não</span></label>
                        </div>
                        <div id="data-fields" class="hidden border rounded p-3 bg-white dark:bg-black/20">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase">DATA</label>
                                    <input type="date" id="data_found" class="w-full p-1 border rounded dark:bg-black/20 dark:text-white">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase">HORÁRIO</label>
                                    <input type="time" id="hora_found" class="w-full p-1 border rounded dark:bg-black/20 dark:text-white">
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="button" onclick="salvarTarefa()" class="w-full bg-primaryBtn text-white py-3 rounded font-bold">Salvar e Enviar Task</button>
                </form>
            </div>
        </section>

        <!-- ABA AUDITORIA -->
        <section id="tab-auditoria" class="page-section hidden">
            <div class="max-w-5xl mx-auto"><h2 class="text-xl font-bold dark:text-darkText mb-4">Casos para Auditar</h2>
            <div id="lista-auditoria" class="grid gap-3"></div></div>
        </section>

        <!-- ABA DASHBOARD -->
        <section id="tab-dashboard" class="page-section hidden">
            <div class="grid grid-cols-4 gap-4 mb-8 text-center" id="cards-stats"></div>
            <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow border border-borderGray/30">
                <h2 class="font-bold dark:text-darkText mb-4">Monitoramento Geral de Tasks</h2>
                <table class="w-full text-left dark:text-white">
                    <thead><tr class="border-b text-xs uppercase"><th>MZ</th><th>Meli</th><th>Qtd</th><th>Status Físico</th><th>Found?</th><th>Resultado Auditoria</th></tr></thead>
                    <tbody id="tabela-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- MODAL AUDITORIA (Corrigido conforme Captura de tela 2026-06-28 183917.png) -->
    <div id="modal-auditoria" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-darkCard p-6 rounded-xl max-w-md w-full dark:text-white shadow-2xl">
            <h2 class="text-xl font-bold mb-1">Auditoria da Tratativa</h2>
            <p class="text-sm text-gray-500 mb-4">Validação final do processo de investigação pelo ICQA</p>
            
            <div id="modal-content" class="bg-gray-50 dark:bg-black/20 p-3 rounded mb-4 font-bold text-sm"></div>

            <div class="mb-4">
                <label class="block font-bold mb-2">Packing realizou a investigação conforme fluxo?</label>
                <div class="flex gap-4"><label><input type="radio" name="investigacao" value="Sim"> Sim</label><label><input type="radio" name="investigacao" value="Não"> Não</label></div>
            </div>

            <div class="mb-4">
                <label class="block font-bold mb-2">Preenchido como:</label>
                <div class="space-y-1">
                    <label class="flex items-center gap-2"><input type="checkbox" value="Erro de picking"> Erro de picking</label>
                    <label class="flex items-center gap-2"><input type="checkbox" value="Erro de packing"> Erro de packing</label>
                    <label class="flex items-center gap-2"><input type="checkbox" value="Inconclusivo"> Inconclusivo</label>
                    <label class="flex items-center gap-2"><input type="checkbox" value="Outros"> Outros</label>
                </div>
            </div>

            <label class="block font-bold mb-1">Team Leader (Gestor)</label>
            <input type="text" id="gestor" class="w-full p-2 border rounded mb-6 dark:bg-black/20" placeholder="Nome do Gestor">

            <div class="flex gap-2">
                <button onclick="finalizarAuditoria('Conforme')" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded font-bold">Conforme</button>
                <button onclick="finalizarAuditoria('Necessita de Correção')" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded font-bold">Necessita Correção</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT (Mantido com a lógica funcional) -->
    <script type="module">
        // ... (Seu script continua o mesmo, apenas certifique-se de que a função finalizarAuditoria capture os novos inputs do modal se desejar salvar esses dados no Firebase)
        window.toggleFound = (show) => document.getElementById('found-section').classList.toggle('hidden', !show);
        window.toggleDataFields = (show) => document.getElementById('data-fields').classList.toggle('hidden', !show);
        
        // Mantendo o resto do seu script de navegação e Firebase
        document.getElementById('theme-toggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', (e) => {
            document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${e.target.getAttribute('data-tab')}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-primaryBtn', 'text-white'));
            e.target.classList.add('bg-primaryBtn', 'text-white');
        }));
        lucide.createIcons();
    </script>
</body>
</html>
