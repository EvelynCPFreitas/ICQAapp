<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ICQA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-200 dark:bg-gray-900 min-h-screen transition-colors duration-300">

    <header class="bg-white dark:bg-gray-800 shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold dark:text-white">Portal ICQA</h1>
        <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 bg-gray-300 dark:bg-gray-700 rounded text-sm font-bold dark:text-white">
            🌓 Mudar Tema
        </button>
    </header>

    <main class="p-8">
        <div class="max-w-xl mx-auto bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md">
            <h2 class="text-2xl font-bold mb-1 dark:text-white">Nova Conferência ICQA</h2>
            <p class="text-gray-500 mb-6 dark:text-gray-400">Insira os dados coletados diretamente no endereço</p>

            <form class="space-y-4">
                <input type="text" placeholder="MZ" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                <input type="text" placeholder="MELI" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                <input type="number" placeholder="QUANTIDADE" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 dark:text-white">

                <div class="p-4 border rounded dark:border-gray-600">
                    <p class="mb-2 dark:text-white">Físico está de acordo com o sistêmico?</p>
                    <input type="radio" name="acordo" value="sim" onchange="document.getElementById('found-box').classList.add('hidden')"> Sim
                    <input type="radio" name="acordo" value="nao" onchange="document.getElementById('found-box').classList.remove('hidden')"> Não
                </div>

                <div id="found-box" class="hidden p-4 border-l-4 border-red-500 bg-red-50 dark:bg-red-900/20 rounded">
                    <p class="mb-2 dark:text-white">Foi realizado Found?</p>
                    <input type="radio" name="found" value="sim"> Sim
                    <input type="radio" name="found" value="nao"> Não
                </div>

                <button type="button" class="w-full bg-blue-900 text-white p-3 rounded font-bold">Salvar e Enviar Task</button>
            </form>
        </div>
    </main>
</body>
</html>
