<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal ICQA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 
            darkBg: '#090F15', darkCard: '#444E54', darkText: '#B3B7BA', 
            lightBg: '#D3D1CE', lightCard: '#FFFFFF', primaryBtn: '#002147', borderGray: '#6C6D74' 
        }}}}
    </script>
</head>
<body class="bg-lightBg dark:bg-darkBg transition-colors duration-300">

    <header class="bg-lightBg dark:bg-darkBg border-b border-borderGray/30 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <h1 class="text-black dark:text-darkText font-bold text-xl">Portal ICQA</h1>
            <nav class="flex items-center space-x-4">
                <div class="flex space-x-1 bg-gray-300/50 dark:bg-black/20 p-1 rounded-lg" id="navbar">
                    <button data-tab="conferencia" class="nav-btn px-4 py-2 rounded-md text-sm font-bold bg-primaryBtn text-white shadow">Conferência</button>
                    <button data-tab="auditoria" class="nav-btn px-4 py-2 rounded-md text-sm font-bold text-black dark:text-darkText">Auditoria</button>
                    <button data-tab="dashboard" class="nav-btn px-4 py-2 rounded-md text-sm font-bold text-black dark:text-darkText">Dashboard</button>
                </div>
                <button id="theme-toggle" class="p-2 rounded-full bg-gray-300 dark:bg-darkCard text-black dark:text-white">
                    <i data-lucide="sun" class="dark:hidden w-5 h-5"></i>
                    <i data-lucide="moon" class="hidden dark:block w-5 h-5"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- ABA CONFERÊNCIA -->
        <section id="tab-conferencia" class="page-section">
            <div class="max-w-xl mx-auto bg-lightCard dark:bg-darkCard p-8 rounded-xl shadow-sm border border-borderGray/30">
                <h2 class="text-2xl font-bold text-black dark:text-darkText mb-1">Nova Conferência ICQA</h2>
                <p class="text-sm text-gray-600 dark:text-darkText/70 mb-6">Insira os dados coletados diretamente no endereço</p>
                
                <form class="space-y-3">
                    <div><label class="block text-xs font-bold text-black dark:text-darkText">MZ</label>
                    <input type="text" id="mz" placeholder="Ex: MZ-04" class="w-full p-2 bg-transparent border border-borderGray rounded-md dark:text-white"></div>
                    <div><label class="block text-xs font-bold text-black dark:text-darkText">MELI</label>
                    <input type="text" id="meli" placeholder="Ex: MELI-12345" class="w-full p-2 bg-transparent border border-borderGray rounded-md dark:text-white"></div>
                    <div><label class="block text-xs font-bold text-black dark:text-darkText">QUANTIDADE</label>
                    <input type="number" id="qtd" placeholder="Ex: 15" class="w-full p-2 bg-transparent border border-borderGray rounded-md dark:text-white"></div>
                    
                    <div class="bg-gray-100 dark:bg-black/20 p-3 rounded-md border">
                        <label class="block text-xs font-bold text-black dark:text-darkText mb-1">Físico está de acordo com o sistêmico?</label>
                        <div class="flex space-x-6 text-sm dark:text-darkText">
                            <label class="flex items-center space-x-1"><input type="radio" name="acordo" value="sim" checked onchange="toggleFound(false)"> <span>Sim</span></label>
                            <label class="flex items-center space-x-1"><input type="radio" name="acordo" value="nao" onchange="toggleFound(true)"> <span>Não</span></label>
                        </div>
                    </div>

                    <div id="found-section" class="hidden p-3 border-l-4 border-red-500 bg-gray-100 dark:bg-black/20 rounded-md">
                        <label class="block text-xs font-bold text-black dark:text-darkText mb-1">Foi realizado Found?</label>
                        <div class="flex space-x-6 text-sm dark:text-darkText">
                            <label class="flex items-center space-x-1"><input type="radio" name="found" value="sim"> <span>Sim</span></label>
                            <label class="flex items-center space-x-1"><input type="radio" name="found" value="nao" checked> <span>Não</span></label>
                        </div>
                    </div>

                    <button type="button" onclick="salvarTarefa()" class="w-full bg-primaryBtn text-white py-2.5 rounded-md font-bold text-sm">Salvar e Enviar Task</button>
                </form>
            </div>
        </section>

        <!-- ABA AUDITORIA (ATUALIZADA) -->
        <section id="tab-auditoria" class="page-section hidden">
            <div class="max-w-4xl mx-auto p-4">
                <h2 class="text-xl font-bold dark:text-darkText mb-4">Casos para Auditar</h2>
                <div id="lista-auditoria" class="grid gap-3">
                    <p class="dark:text-darkText">Carregando casos...</p>
                </div>
            </div>
        </section>

        <!-- ABA DASHBOARD -->
        <section id="tab-dashboard" class="page-section hidden">
            <div class="max-w-4xl mx-auto text-center dark:text-darkText">
                <h2 class="text-xl font-bold">Dashboard de Performance</h2>
                <p>Em breve: gráficos de auditoria.</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHkwoHVDJVtEYtDzqbhbNp0wqUUGJNfQY",
            authDomain: "portalicqa.firebaseapp.com",
            projectId: "portalicqa",
            storageBucket: "portalicqa.firebasestorage.app",
            messagingSenderId: "894316718460",
            appId: "1:894316718460:web:d07e8bc5646e982fe19cf9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // LEITURA EM TEMPO REAL DA AUDITORIA
        const listaAuditoria = document.getElementById('lista-auditoria');
        onSnapshot(query(collection(db, "tarefas"), orderBy("criadoEm", "desc")), (snapshot) => {
            listaAuditoria.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                listaAuditoria.innerHTML += `
                    <div class="bg-white dark:bg-darkCard p-4 rounded-lg border border-borderGray/30 shadow-sm flex justify-between items-center">
                        <div>
                            <p class="font-bold text-black dark:text-white">MELI: ${data.meli}</p>
                            <p class="text-sm text-gray-600 dark:text-darkText">MZ: ${data.mz} | Qtd: ${data.qtd}</p>
                        </div>
                        <span class="px-2 py-1 text-xs font-bold bg-yellow-100 text-yellow-800 rounded">Pendente</span>
                    </div>
                `;
            });
        });

        window.salvarTarefa = async () => {
            const mz = document.getElementById('mz').value;
            const meli = document.getElementById('meli').value;
            const qtd = document.getElementById('qtd').value;
            if(!mz || !meli || !qtd) { alert("Preencha todos os campos!"); return; }
            try {
                await addDoc(collection(db, "tarefas"), { mz, meli, qtd, status: "pendente", criadoEm: new Date() });
                alert("Task enviada para auditoria!");
                document.getElementById('mz').value = '';
                document.getElementById('meli').value = '';
                document.getElementById('qtd').value = '';
            } catch (e) { alert("Erro ao salvar!"); }
        };
    </script>
    <script>
        function toggleFound(mostrar) { document.getElementById('found-section').classList.toggle('hidden', !mostrar); }
        document.getElementById('theme-toggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        document.querySelectorAll('.nav-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.page-section').forEach(s => s.classList.add('hidden'));
                document.getElementById(`tab-${button.getAttribute('data-tab')}`).classList.remove('hidden');
                document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('bg-primaryBtn', 'text-white'));
                button.classList.add('bg-primaryBtn', 'text-white');
            });
        });
        lucide.createIcons();
    </script>
</body>
</html>
