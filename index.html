<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portal ICQA - Sistema Integrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-blue-900 p-4 text-white flex justify-between">
        <h1 class="font-bold text-xl">Meli ICQA Portal</h1>
        <div class="space-x-4">
            <button onclick="mudarAba('conferencia')" class="hover:underline">Conferência</button>
            <button onclick="mudarAba('auditoria')" class="hover:underline">Auditoria</button>
            <button onclick="mudarAba('dashboard')" class="hover:underline font-bold bg-blue-700 px-3 py-1 rounded">Dashboard</button>
        </div>
    </nav>

    <main class="p-6">
        <section id="conferencia" class="max-w-md mx-auto bg-white p-6 rounded shadow">
            <h2 class="text-xl font-bold mb-4">Nova Conferência</h2>
            <form id="form-conferencia" class="space-y-3">
                <input type="text" id="mz" placeholder="MZ" class="w-full border p-2">
                <input type="text" id="meli" placeholder="Meli" class="w-full border p-2">
                <input type="number" id="qtd" placeholder="Quantidade" class="w-full border p-2">
                
                <div>
                    <label>Físico de acordo com sistêmico?</label>
                    <select id="fisico_ok" class="w-full border p-2" onchange="toggleFound()">
                        <option value="Sim">Sim</option>
                        <option value="Não">Não</option>
                    </select>
                </div>

                <div id="div-found" class="hidden">
                    <label>Foi realizado Found?</label>
                    <select id="realizou_found" class="w-full border p-2" onchange="toggleData()">
                        <option value="Não">Não</option>
                        <option value="Sim">Sim</option>
                    </select>
                </div>

                <div id="div-data" class="hidden">
                    <input type="datetime-local" id="data_found" class="w-full border p-2">
                </div>

                <button type="button" onclick="salvarConferencia()" class="w-full bg-green-600 text-white p-2 rounded">Enviar</button>
            </form>
        </section>

        <section id="auditoria" class="hidden">
            <div id="lista-auditoria" class="grid gap-4"></div>
        </section>

        <section id="dashboard" class="hidden">
            <div class="grid grid-cols-4 gap-4 mb-6" id="dashboard-stats"></div>
            <table class="w-full bg-white shadow rounded">
                <thead class="bg-gray-200">
                    <tr><th>MZ</th><th>Meli</th><th>Qtd</th><th>Status Físico</th><th>Found?</th><th>Resultado</th></tr>
                </thead>
                <tbody id="tabela-monitoramento"></tbody>
            </table>
        </section>
    </main>

    <div id="modal-auditoria" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white p-6 rounded w-96">
            <h2 class="font-bold mb-4">Auditoria da Tratativa</h2>
            <div id="modal-content"></div>
            <div class="flex gap-2 mt-4">
                <button onclick="finalizarAuditoria('Conforme')" class="flex-1 bg-green-600 text-white p-2">Conforme</button>
                <button onclick="finalizarAuditoria('Necessita Correção')" class="flex-1 bg-red-600 text-white p-2">Necessita Correção</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURAÇÃO FIREBASE (Use suas credenciais)
        const db = getFirestore(initializeApp({ /* SEU CONFIG AQUI */ }));

        // Funções de UI
        window.mudarAba = (id) => {
            document.querySelectorAll('main section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.toggleFound = () => {
            document.getElementById('div-found').classList.toggle('hidden', document.getElementById('fisico_ok').value === 'Sim');
        };

        window.toggleData = () => {
            document.getElementById('div-data').classList.toggle('hidden', document.getElementById('realizou_found').value === 'Não');
        };

        // Salvar Conferência
        window.salvarConferencia = async () => {
            const data = {
                mz: document.getElementById('mz').value,
                meli: document.getElementById('meli').value,
                qtd: document.getElementById('qtd').value,
                fisico_ok: document.getElementById('fisico_ok').value,
                realizou_found: document.getElementById('realizou_found').value,
                data_found: document.getElementById('data_found').value,
                auditoria: 'Aguardando',
                criadoEm: new Date()
            };
            await addDoc(collection(db, "tasks"), data);
            alert("Conferência registrada!");
        };

        // Escuta de dados e atualização do Dashboard
        onSnapshot(collection(db, "tasks"), (snapshot) => {
            const tasks = [];
            snapshot.forEach(d => tasks.push({id: d.id, ...d.data()}));
            
            // Lógica do Dashboard
            atualizarDashboard(tasks);
        });

        function atualizarDashboard(tasks) {
            const tbody = document.getElementById('tabela-monitoramento');
            tbody.innerHTML = '';
            
            tasks.forEach(t => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${t.mz}</td><td>${t.meli}</td><td>${t.qtd}</td>
                    <td>${t.fisico_ok === 'Sim' ? 'OK' : 'Divergência'}</td>
                    <td>${t.realizou_found === 'Sim' ? 'Sim (' + t.data_found + ')' : 'Não'}</td>
                    <td>${t.auditoria}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.finalizarAuditoria = async (resultado) => {
            const id = window.currentTaskId;
            await updateDoc(doc(db, "tasks", id), { auditoria: resultado });
            document.getElementById('modal-auditoria').classList.add('hidden');
            mudarAba('dashboard');
        };
    </script>
</body>
</html>
